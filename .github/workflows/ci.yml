name: SQL acceptance tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Configure local environment
        run: cp .env.example .env
      - name: Build deterministic database
        run: make setup
      - name: Run acceptance suite
        run: make test
